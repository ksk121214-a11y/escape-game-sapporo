<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メールボックスログイン</title>
<br>
<a href="index.html">
<button>トップページへ</button>
</a>
<style>

/* ===== 全体 ===== */

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
}

/* ===== ログイン画面 ===== */

.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:#1e1e1e;
padding:40px;
border-radius:10px;
text-align:center;
width:300px;
}

.login-box input{
width:200px;
padding:10px;
font-size:18px;
text-align:center;
letter-spacing:5px;
margin-bottom:15px;
}

.login-box button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#errorMessage{
color:red;
font-weight:bold;
margin-top:10px;
}

/* ===== ターミナルボタン ===== */

.terminal-launch{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#222;
text-align:center;
padding:15px;
}

.terminal-launch button{
padding:10px 20px;
font-size:16px;
}

/* ===== ターミナル ===== */

#terminal{
position:fixed;
bottom:60px;
left:0;

width:100%;
height:40vh;

background:black;
color:#00ff00;

display:none;

padding:20px;

font-family:monospace;

overflow:auto;

box-sizing:border-box;
}

/* ターミナル入力 */

.terminal-input{
display:flex;
align-items:center;
margin-top:15px;
}

.prompt{
margin-right:10px;
}

#terminalCursor{
flex-grow:1;
}

/* 実行ボタン */

#runBtn{
background:#00ff00;
color:black;
border:none;
padding:6px 16px;
font-weight:bold;
cursor:pointer;
margin-left:10px;
}

</style>

<script defer src="js/mailbox_login.js"></script>

</head>

<body>

<!-- ログイン -->

<div class="login-container">

<div class="login-box">

<h1>MAIL BOX LOGIN</h1>

<p>暗証番号を入力してください</p>

<input
type="password"
id="pinInput"
maxlength="6"
placeholder="******"
>

<br>

<button id="loginBtn">確定</button>

<p id="errorMessage"></p>

</div>

</div>


<!-- ターミナル -->

<div id="terminal">

<p id="terminalResult">START HACKING? (yes/no)</p>

<div class="terminal-input">

<span class="prompt">root@detective:~$</span>

<span id="terminalCursor">_</span>

<button id="runBtn">実行</button>

</div>

</div>


<!-- 下ボタン -->

<div class="terminal-launch">

<button id="terminalBtn">
ターミナル起動
</button>

</div>

</body>
</html>
