<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAIL</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: white;
}

/* ===== メール全画面 ===== */
.email-card {
    width: 100vw;
    height: 100vh;
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    cursor: pointer;
}

/* ヘッダー */
.email-header {
    background: #e6e6e6;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* 未読マーク */
.unread-dot {
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
}

/* 展開で消える */
.email-card.open .unread-dot {
    display: none;
}

/* 本文 */
.email-body {
    flex: 1;
    padding: 30px;
    display: none;
    font-size: 18px;
    line-height: 1.6;
}

/* 展開 */
.email-card.open .email-body {
    display: block;
}

/* ボタン */
.next-btn {
    margin-top: 30px;
    padding: 15px 25px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

.next-btn:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="email-card" id="mailCard" onclick="openMail()">

    <div class="email-header">
        <span class="unread-dot"></span>
        <strong>From:</strong> Dr. Adrian Heinrich
        <span class="email-subject">緊急 — 残り時間は30分</span>
        <span style="margin-left:auto;" id="mailDate"></span>
    </div>

    <div class="email-body">

        <p>Mr. Ueno</p>

        <p>
            時間がない。<br>
        </p>

        <p> 
            テロ組織の計画は最終段階に入っている。<br>
            このままでは、30分後にウイルスが拡散される。
        </p>    
            私は奴らのシステムへの侵入に成功した。<br>
            だが――最後の暗号が解けない。
         <p>   
            それが、今君の手元にある最後の謎だ。<br>
            それを解けば、装置は停止できる。
         </p>
         <p>
            頼む。<br>
            すべては君にかかっている。
         </p>
            ハッキングした制御ページを共有する。<br>
            ここからアクセスしてくれ。 
        <!-- finalリンク -->
        <button class="next-btn" onclick="goFinal(event)">
            アクセスが可能です →
        </button>

    </div>

</div>

<script>

// 日付
window.onload = () => {
    const now = new Date();
    document.getElementById("mailDate").textContent =
        `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
};

// 展開
function openMail() {
    document.getElementById("mailCard").classList.add("open");
}

// final.htmlへ
function goFinal(e) {
    e.stopPropagation(); // カード展開と競合防止
    location.href = "final.html";
}

</script>

</body>
</html>
