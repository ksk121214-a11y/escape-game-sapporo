<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAIL</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: white;
}

/* ===== メール全画面 ===== */
.email-card {
    width: 100vw;
    height: 100vh;
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    cursor: pointer;
}

/* ヘッダー */
.email-header {
    background: #e6e6e6;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* 未読マーク */
.unread-dot {
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
}

/* 展開で消える */
.email-card.open .unread-dot {
    display: none;
}

/* 本文 */
.email-body {
    flex: 1;
    padding: 30px;
    display: none;
    font-size: 18px;
    line-height: 1.6;
}

/* 展開 */
.email-card.open .email-body {
    display: block;
}

/* ボタン */
.next-btn {
    margin-top: 30px;
    padding: 15px 25px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}

.next-btn:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="email-card" id="mailCard" onclick="openMail()">

    <div class="email-header">
        <span class="unread-dot"></span>
        <strong>From:</strong> Dr. Adrian Heinrich
        <span style="margin-left:auto;" id="mailDate"></span>
    </div>

    <div class="email-body">

        <p>Mr. Ueno</p>

        <p>
            30分以内に次の課題をクリアしないと<br>
            ウイルスが街中に放出される。
        </p>

        <p>
            私はテロ組織をハッキングした。<br>
            最後の謎を解いてくれ。
        </p>

        <!-- finalリンク -->
        <button class="next-btn" onclick="goFinal(event)">
            最終ファイルへ進む →
        </button>

    </div>

</div>

<script>

// 日付
window.onload = () => {
    const now = new Date();
    document.getElementById("mailDate").textContent =
        `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
};

// 展開
function openMail() {
    document.getElementById("mailCard").classList.add("open");
}

// final.htmlへ
function goFinal(e) {
    e.stopPropagation(); // カード展開と競合防止
    location.href = "final.html";
}

</script>

</body>
</html>
