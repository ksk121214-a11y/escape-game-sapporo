<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCAN SYSTEM</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
}

/* カメラ全画面 */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

/* 太いスキャンライン */
.line {
    position: fixed;
    left: 0;
    width: 100%;
    height: 6px;
    background: #00aaff;
    box-shadow: 0 0 15px #00aaff;
    opacity: 0.9;
}

.line1 { top: 35%; }
.line2 { top: 65%; }

/* 指示文（線のすぐ上） */
.hint {
    position: fixed;
    top: 15%;
    width: 100%;
    text-align: center;

    font-size: 34px;
    font-weight: bold;
    color: #000;

    text-shadow:
        0 0 10px #00aaff,
        0 0 20px #00aaff,
        0 0 40px #00aaff;

    letter-spacing: 3px;
}

/* 1990（線の内側いっぱい） */
.number {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    font-size: 160px;
    font-weight: bold;
    color: #00ccff;

    text-shadow:
        0 0 10px #00ccff,
        0 0 25px #00ccff,
        0 0 50px #00ccff,
        0 0 80px #00ccff;

    display: none;

    animation: glowPulse 1.2s infinite alternate;
}

/* 光の脈動 */
@keyframes glowPulse {
    0% {
        transform: translate(-50%, -50%) scale(1);
        filter: brightness(1);
    }
    100% {
        transform: translate(-50%, -50%) scale(1.05);
        filter: brightness(1.4);
    }
}

/* スキャン完了（線の外・上） */
.complete {
    position: fixed;
    top: 8%;
    width: 100%;
    text-align: center;

    font-size: 48px;
    font-weight: bold;
    color: #000;

    text-shadow:
        0 0 15px #00aaff,
        0 0 40px #00aaff;
    display: none;
}

/* UIボタン */
.ui {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    gap: 12px;

    width: 90vw;
    max-width: 360px;

    justify-content: center;
}

button {
    flex: 1;

    padding: 16px 0;
    font-size: 32px;
    font-weight: bold;

    background: rgba(0,170,255,0.25);
    border: 2px solid #00aaff;
    color: #00aaff;

    border-radius: 12px;
    box-shadow: 0 0 12px #00aaff;

    white-space: nowrap;
}

button:active {
    transform: scale(0.95);
    box-shadow: 0 0 20px #00aaff;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<div class="line line1"></div>
<div class="line line2"></div>

<div class="hint">線の内側に数字を合わせてください</div>

<div class="number" id="number">1990</div>
<div class="complete" id="complete">スキャン完了</div>

<div class="ui">
    <button onclick="switchCamera()">カメラ切替</button>
    <button onclick="scan()">スキャン</button>
</div>

<script>
let stream;
let facing = "environment";

async function startCamera() {
    if (stream) {
        stream.getTracks().forEach(t => t.stop());
    }

    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing }
    });

    document.getElementById("camera").srcObject = stream;
}

function switchCamera() {
    facing = (facing === "environment") ? "user" : "environment";
    startCamera();
}

function scan() {
    const num = document.getElementById("number");
    const comp = document.getElementById("complete");

    // 🔥必ずリセット
    comp.style.display = "none";

    num.style.display = "block";

    setTimeout(() => {
        comp.style.display = "block";

        setTimeout(() => {
            location.href = "escape-system.html?scan=ok";
        }, 1500);

    }, 2000);
}

startCamera();
</script>

</body>
</html>
