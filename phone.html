<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone</title>

<style>
body {
    margin: 0;
    background: #f9f9f9;
    color: #000;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* 戻る */
.back-btn {
    position: absolute;
    top: 15px;
    left: 15px;
    background: none;
    color: #0a84ff;
    border: none;
    font-size: 16px;
}

/* 🔥 全体中央固定 */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* 🔥 表示エリア（固定） */
.display-area {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#display {
    font-size: 36px;
    letter-spacing: 3px;
}

/* 🔥 キーパッド（固定） */
.keypad {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 15px;
    margin-top: 10px;
}

.key {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #333;
    font-size: 24px;
    color: white;
    border: none;
}

.key:active {
    background: #555;
}

/* 🔥 下ボタン完全固定 */
.controls {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 20px;
    justify-content: center;
}

/* 全ボタン統一 */
.ctrl-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
}

/* 個別色 */
.call { background: #34c759; }
.delete { background: #555; }
.replay {
    background: #0a84ff;
    color: white;

    opacity: 1;
}

</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">← 戻る</button>

<div class="container">

    <!-- 表示 -->
    <div class="display-area">
        <div id="display"></div>
    </div>

    <!-- キーパッド -->
    <div class="keypad">
        <button class="key" onclick="press('1')">1</button>
        <button class="key" onclick="press('2')">2</button>
        <button class="key" onclick="press('3')">3</button>

        <button class="key" onclick="press('4')">4</button>
        <button class="key" onclick="press('5')">5</button>
        <button class="key" onclick="press('6')">6</button>

        <button class="key" onclick="press('7')">7</button>
        <button class="key" onclick="press('8')">8</button>
        <button class="key" onclick="press('9')">9</button>

        <button class="key" onclick="press('*')">*</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key" onclick="press('#')">#</button>
    </div>

    <!-- 下ボタン -->
    <div class="controls">
        <button class="ctrl-btn delete" onclick="deleteLast()">⌫</button>
        <button class="ctrl-btn call" onclick="call()">📞</button>
        <button id="replayBtn" class="ctrl-btn replay" onclick="playCode()">▶</button>
    </div>

</div>

<script>
let number = "";
let stage = 0;

function speak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.rate = 0.9;

    speechSynthesis.cancel();

    setTimeout(() => {
        speechSynthesis.speak(u);
    }, 100);
}

function play(file) {
    new Audio(file).play();
}

function setDisplay(text) {
    document.getElementById("display").textContent = text;
}

// 入力
function press(n) {
    number += n;
    setDisplay(number);

    if (stage === 2) {

        if (n === "2") {
            play("gag.mp3");
            setTimeout(() => play("end.mp3"), 3000);
        }

        if (n === "1") {
            speak("では、C、B、E、Aを押してください。");

            number = "";
            setDisplay("通話中");
        }

        if (number === "0532") {
            stage = 3;

            speak("解析中、成功しました。暗号は4、7、9、2、8です。");

            document.getElementById("replayBtn").style.display = "block";

            number = "";
            setDisplay("通話中");
        }
    }
}

// デリート
function deleteLast() {
    number = number.slice(0, -1);
    setDisplay(number);
}

// 再生
function playCode() {
    speak("暗号は4、7、9、2、8です。");
}

// 発信
function call() {
    if (number !== "0120763954") return;

    setDisplay("発信中...");

    setTimeout(() => {
        play("call.mp3");

        setTimeout(() => {
            setDisplay("通話中");

            speak("暗号機密センターです。暗号を知りたい方は1を、一発ギャグを聞きたい方は2を、押してください。");

            stage = 2;
            number = "";
        }, 2500);

    }, 800);
}

function goBack() {
    location.href = "escape-system.html";
}
</script>

</body>
</html>
