<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>謎解きファイル</title>

<style>
body {
    margin: 0;
    background: #1a1a1a;
    color: #e8e0c9;
    font-family: "Courier New", monospace;
}

/* ナビ */
.mobile-menu {
    background: #111;
    padding: 15px;
    display: flex;
    justify-content: space-around;
}

.mobile-menu a {
    color: #e8e0c9;
    text-decoration: none;
    font-size: 14px;
}

/* メイン */
.container {
    text-align: center;
    padding: 40px 20px;
}

/* ファイル */
.file {
    border: 2px solid #c2b280;
    background: #2b2b2b;
    padding: 30px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.7);
}

h1 {
    letter-spacing: 2px;
}

/* 入力 */
input {
    padding: 10px;
    width: 70%;
    font-size: 18px; /* ←これが重要 */
    margin-top: 20px;
    background: #111;
    color: #e8e0c9;
    border: 1px solid #c2b280;
}

/* ボタン */
button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #444;
    color: #e8e0c9;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #666;
}

/* メッセージ */
#message {
    margin-top: 15px;
    height: 20px;
}

/* 最終 */
#final {
    margin-top: 30px;
    font-size: 20px;
    color: #ffcc66;
}

/* フッター */
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    margin-top: 50px;
}

/* ピアノ */
.piano {
    display: flex;
    justify-content: center;
}

/* 白鍵の枠 */
.key {
    position: relative;
}

/* 白鍵 */
.white {
    width: 40px;
    height: 120px;
    background: white;
    border: 1px solid #333;
}

/* 黒鍵（中央に配置） */
.black {
    width: 25px;
    height: 80px;
    background: black;
    position: absolute;
    top: 0;
    right: -12px; /* ←これが神ポイント */
    z-index: 2;
}

#nextBtn {
    margin-top: 20px;
    padding: 12px 24px;
    background: #222;
    color: #ffcc66;
    border: 1px solid #ffcc66;
}

</style>
</head>

<body>

<!-- ナビ -->
<nav class="mobile-menu" id="mobileMenu">
    <a href="index.html">TOP NEWS</a>
    <a href="mailbox.html">MAIL BOX</a>
    <a href="puzzle.html">謎解きページ</a>
    <a href="hint.html">速報</a>
</nav>

<div class="container">

    <h1>DETECTIVE FILE</h1>

    <div class="file" id="fileBox">
        <h2 id="fileTitle">File 1</h2>

        <p id="question">
            この街の中心に立つ塔<br>
            時を刻み 人々を見守る
        </p>

        <div id="pianoArea" style="display:none; margin-top:20px;">
                <button onclick="playMelody()">▶ 再生</button>

                <div class="piano">

                    <!-- ド（黒鍵あり） -->
                    <div class="key">
                        <div class="white" onclick="playNote('do')"></div>
                        <div class="black" onclick="playNote('do')"></div>
                    </div>

                    <!-- レ（黒鍵あり） -->
                    <div class="key">
                        <div class="white" onclick="playNote('re')"></div>
                        <div class="black" onclick="playNote('re')"></div>
                    </div>

                    <!-- ミ（黒鍵なし） -->
                    <div class="key">
                        <div class="white" onclick="playNote('mi')"></div>
                    </div>

                    <!-- ファ（黒鍵あり） -->
                    <div class="key">
                        <div class="white" onclick="playNote('fa')"></div>
                        <div class="black" onclick="playNote('fa')"></div>
                    </div>

                    <!-- ソ（黒鍵あり） -->
                    <div class="key">
                        <div class="white" onclick="playNote('so')"></div>
                        <div class="black" onclick="playNote('so')"></div>
                    </div>

                    <!-- ラ（黒鍵あり） -->
                    <div class="key">
                        <div class="white" onclick="playNote('la')"></div>
                        <div class="black" onclick="playNote('la')"></div>
                    </div>

                    <!-- シ（黒鍵なし） -->
                    <div class="key">
                        <div class="white" onclick="playNote('si')"></div>
                    </div>

                </div>
        </div>

        <input type="text" id="answer" placeholder="推理結果を入力…">
        <br>
        <button onclick="checkAnswer()">確認</button>

        <p id="message"></p>
    </div>

    <p id="final"></p>

    <button id="nextBtn" style="display:none;" onclick="goNextFile()">
        File2を捜査する →
    </button>

</div>

<footer>
    <p>© 2026 世界ニュース速報</p>
</footer>

<script src="js/puzzle.js"></script>

</body>
</html>
